# OpenSpec CI/CD Orchestrator — example configuration.
#
# The orchestrator polls each repository on its configured interval, processes
# any ready OpenSpec changes via the configured executor, and opens a monolithic
# Pull Request per pass.

repositories:
  # Example 1: a backend service on a fast polling loop.
  - url: "git@github.com:my-org/auth-service.git"
    base_branch: "main"
    agent_branch: "agent-q"
    poll_interval_sec: 300
    # local_path is optional; if omitted, derived as
    # /tmp/workspaces/<sanitized-url> deterministically.
    # local_path: "/tmp/workspaces/auth-service"

  # Example 2: a frontend application on a slower interval.
  - url: "git@github.com:my-org/web-dashboard.git"
    base_branch: "dev"
    agent_branch: "agent-q"
    poll_interval_sec: 3600

executor:
  # Currently supported: claude_cli (wraps the `claude` CLI as a subprocess).
  kind: claude_cli
  command: claude
  # Maximum wall-clock seconds for a single change implementation. The child
  # process is killed if it exceeds this budget.
  timeout_secs: 1800

github:
  # Name of the environment variable holding the GitHub PAT or fine-grained
  # token. The orchestrator reads the token at PR-creation time only.
  token_env: GITHUB_TOKEN
